services:
  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    environment:
      PORT: "4000"
      # Set to enable live Claude reasoning; omit for deterministic demo mode.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    ports:
      - "4000:4000"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
