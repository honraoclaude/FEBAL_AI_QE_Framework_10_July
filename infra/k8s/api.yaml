apiVersion: apps/v1
kind: Deployment
metadata:
  name: qe-ai-api
  namespace: qe-ai
  labels:
    app: qe-ai-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: qe-ai-api
  template:
    metadata:
      labels:
        app: qe-ai-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: api
          image: ghcr.io/your-org/qe-ai-api:latest
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: qe-ai-secrets
                  key: anthropic-api-key
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: qe-ai-api
  namespace: qe-ai
spec:
  selector:
    app: qe-ai-api
  ports:
    - port: 4000
      targetPort: 4000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qe-ai-api
  namespace: qe-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qe-ai-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
